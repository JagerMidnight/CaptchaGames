<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptchaGames | Browse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .game-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
            background-color: #1e293b;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <header class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="p-2 bg-blue-600 rounded-lg">
                    <i class="fas fa-gamepad text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Captcha<span class="text-blue-500">Games</span></h1>
            </div>
            <a href="https://github.com/JagerMidnight/CaptchaGames" target="_blank" class="text-slate-400 hover:text-white transition-colors">
                <i class="fab fa-github text-2xl"></i>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12">
        <div class="text-center mb-16">
            <div class="relative max-w-xl mx-auto">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-search text-slate-500"></i>
                </div>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search games..." 
                    class="block w-full pl-12 pr-4 py-4 bg-slate-800 border border-slate-700 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-xl"
                >
            </div>
        </div>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-800 h-12 w-12 mb-4"></div>
            <p class="text-slate-400 animate-pulse">Fetching games from GitHub...</p>
        </div>

        <div id="error" class="hidden text-center py-20">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-900/20 text-red-500 mb-4">
                <i class="fas fa-exclamation-triangle text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Failed to load games</h3>
            <p class="text-slate-400" id="errorMessage">Check your connection or API limits.</p>
            <button onclick="fetchGames()" class="mt-6 px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors">Try Again</button>
        </div>

        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

        <div id="emptyState" class="hidden text-center py-20">
            <p class="text-slate-400 text-lg">No games found matching your search.</p>
        </div>
    </main>

    <script>
        const REPO_OWNER = 'JagerMidnight';
        const REPO_NAME = 'CaptchaGames';
        const FOLDER_PATH = 'games';
        
        const gamesGrid = document.getElementById('gamesGrid');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const errorMessage = document.getElementById('errorMessage');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');

        let allGames = [];

        async function fetchGames() {
            loading.classList.remove('hidden');
            gamesGrid.classList.add('hidden');
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FOLDER_PATH}`);
                
                if (!response.ok) throw new Error('Could not fetch the games directory.');
                
                const data = await response.json();
                
                allGames = data
                    .filter(file => file.name.endsWith('.html') && file.type === 'file')
                    .map(file => {
                        const slug = file.name.replace('.html', '');
                        const title = slug
                            .split('-')
                            .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                            .join(' ');
                            
                        return {
                            name: file.name,
                            slug: slug,
                            title: title,
                            gameUrl: `/game/${slug}` 
                        };
                    });

                renderGames(allGames);
            } catch (err) {
                console.error(err);
                errorDiv.classList.remove('hidden');
                errorMessage.textContent = err.message;
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderGames(games) {
            gamesGrid.innerHTML = '';
            
            if (games.length === 0) {
                emptyState.classList.remove('hidden');
                gamesGrid.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                gamesGrid.classList.remove('hidden');
                
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card bg-slate-800/40 p-6 rounded-2xl flex flex-col justify-between';
                    
                    card.innerHTML = `
                        <div>
                            <div class="w-12 h-12 rounded-xl bg-blue-600/20 text-blue-400 flex items-center justify-center mb-4 font-bold text-xl">
                                ${game.title.charAt(0)}
                            </div>
                            <h3 class="text-xl font-bold mb-1 truncate" title="${game.title}">${game.title}</h3>
                            <p class="text-xs text-slate-500 font-mono mb-6 uppercase tracking-wider">${game.slug}</p>
                        </div>
                        <a href="${game.gameUrl}" class="w-full py-3 bg-slate-700 hover:bg-blue-600 text-white rounded-xl font-semibold text-center transition-all flex items-center justify-center space-x-2">
                            <span>Launch Game</span>
                            <i class="fas fa-arrow-right text-xs"></i>
                        </a>
                    `;
                    gamesGrid.appendChild(card);
                });
            }
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allGames.filter(game => 
                game.title.toLowerCase().includes(term) || 
                game.slug.toLowerCase().includes(term)
            );
            renderGames(filtered);
        });

        window.onload = fetchGames;
    </script>
</body>
</html>
